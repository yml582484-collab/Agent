# DeepSeek Agent Configuration

# LLM Configuration
llm:
  provider: "deepseek"
  model: "deepseek-chat"
  api_base: "https://api.deepseek.com/v1"
  temperature: 0.7
  max_tokens: 4096
  stream: true
  # Retry configuration
  retry:
    max_retries: 3
    retry_delay: 1.0

# Memory Configuration
memory:
  short_term:
    window_size: 10  # Number of recent messages to keep
    max_tokens: 8000  # Max tokens in context
  
  long_term:
    vector_db: "chromadb"
    persist_directory: "./data/chromadb"
    collection_name: "agent_memories"
    embedding_model: "all-MiniLM-L6-v2"
    similarity_threshold: 0.7
    max_results: 5

# Tool Configuration
tools:
  enabled:
    - web_search
    - calculator
    - code_executor
    - file_manager
  
  web_search:
    engine: "duckduckgo"  # or google, bing
    max_results: 5
  
  code_executor:
    timeout: 30  # seconds
    allowed_languages: ["python", "javascript"]
  
  file_manager:
    base_path: "./workspace"
    allowed_extensions: [".txt", ".md", ".py", ".json", ".csv"]

# Agent Configuration
agent:
  name: "DeepSeek 智能助手"
  language: "zh-CN"  # 默认语言：简体中文
  max_iterations: 8  # Max ReAct loops (降低以避免长时间等待)
  thinking_verbose: true  # Show reasoning steps
  safe_mode: true  # Enable safety checks

# API Server Configuration (FastAPI)
server:
  host: "0.0.0.0"
  port: 8000
  debug: false
  cors_origins: ["*"]
  
# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/agent.log"
  max_file_size: 10485760  # 10MB
  backup_count: 5
